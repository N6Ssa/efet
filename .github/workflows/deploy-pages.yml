name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build
        env:
          VITE_BASE_PATH: /efet/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true

      - name: Pages setup reminder
        if: success()
        run: |
          {
            echo "## GitHub Pages"
            echo ""
            echo "Build uploaded to the \`gh-pages\` branch."
            echo ""
            echo "If https://n6ssa.github.io/efet/ shows 404, enable Pages once:"
            echo "1. Repo **Settings → Pages**"
            echo "2. **Source:** Deploy from a branch"
            echo "3. **Branch:** \`gh-pages\` / \`(root)\` → Save"
            echo ""
            echo "Private repos need **GitHub Pro** for Pages, or make the repo **Public**."
            echo ""
            echo "Site URL: https://n6ssa.github.io/efet/"
          } >> "$GITHUB_STEP_SUMMARY"
